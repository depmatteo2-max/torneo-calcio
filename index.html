<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhodense Calcio - Tornei</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loading-logo">
        <img id="loading-img" style="width:100px;height:100px;border-radius:50%;object-fit:cover;" alt="Rhodense Calcio">
        <div class="loading-text">Rhodense Calcio</div>
      </div>
    </div>

    <div id="main-app" style="display:none;">
      <header>
        <div class="header-inner">
          <div class="header-left">
            <img id="header-logo" style="width:38px;height:38px;border-radius:50%;object-fit:cover;" alt="Rhodense">
            <div>
              <div id="header-title" class="h-title">Rhodense Calcio</div>
              <div id="header-date" class="h-date"></div>
            </div>
          </div>

          <div class="header-right">
            <span class="live-badge">● Live</span>
            <button class="admin-toggle" id="admin-btn" onclick="toggleAdmin()">Admin</button>
          </div>
        </div>
      </header>

      <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
          <div class="modal-title">Accesso Admin</div>

          <input
            type="text"
            id="username"
            placeholder="Username"
            class="modal-input"
            style="margin-bottom:8px;"
          >

          <input
            type="password"
            id="password"
            placeholder="Password"
            class="modal-input"
            onkeydown="if(event.key==='Enter')checkPw()"
          >

          <div id="pw-error" style="color:#ff4444;font-size:12px;margin-top:6px;min-height:16px;"></div>

          <div class="modal-actions">
            <button class="btn" onclick="document.getElementById('admin-modal').style.display='none'">Annulla</button>
            <button class="btn btn-p" onclick="checkPw()">Entra</button>
          </div>
        </div>
      </div>

      <nav>
        <div class="nav-inner" id="pub-nav">
          <button class="nav-btn active" data-section="classifiche" onclick="showSection('classifiche',this)">Classifiche</button>
          <button class="nav-btn" data-section="risultati" onclick="showSection('risultati',this)">Risultati</button>
          <button class="nav-btn" data-section="tabellone" onclick="showSection('tabellone',this)">Tabellone</button>
        </div>

        <div class="nav-inner" id="admin-nav" style="display:none;">
          <button class="nav-btn active" data-section="a-tornei" onclick="showSection('a-tornei',this)">Tornei</button>
          <button class="nav-btn" data-section="a-setup" onclick="showSection('a-setup',this)">Categorie</button>
          <button class="nav-btn" data-section="a-loghi" onclick="showSection('a-loghi',this)">Loghi</button>
          <button class="nav-btn" data-section="a-risultati" onclick="showSection('a-risultati',this)">Risultati</button>
          <button class="nav-btn" data-section="a-knockout" onclick="showSection('a-knockout',this)">Fase finale</button>
          <button class="nav-btn nav-exit" onclick="exitAdmin()">✕ Esci</button>
        </div>
      </nav>

      <div id="torneo-bar" class="torneo-bar"></div>
      <div class="cat-bar" id="cat-bar"></div>

      <main id="main-content">
        <div id="sec-classifiche" class="sec active"></div>
        <div id="sec-risultati" class="sec"></div>
        <div id="sec-tabellone" class="sec"></div>

        <div id="sec-a-tornei" class="sec"></div>
        <div id="sec-a-setup" class="sec"></div>
        <div id="sec-a-loghi" class="sec"></div>
        <div id="sec-a-risultati" class="sec"></div>
        <div id="sec-a-knockout" class="sec"></div>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="logo_rhodense.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="import.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
  <script src="features.js"></script>
  <script src="tv.js"></script>
</body>
</html>
