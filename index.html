<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Pro Experience — Risultati Live</title>

  <meta property="og:title"       content="Soccer Pro Experience — Risultati Live">
  <meta property="og:description" content="Segui il torneo in diretta! Classifiche, risultati e tabellone in tempo reale.">
  <meta property="og:image"       content="https://i.imgur.com/lEVpAkY.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url"         content="https://depmatteo2-max.github.io/torneo-calcio/">
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Soccer Pro Experience">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Soccer Pro Experience — Risultati Live">
  <meta name="twitter:description" content="Segui il torneo in diretta! Classifiche e risultati in tempo reale.">
  <meta name="twitter:image"       content="https://i.imgur.com/lEVpAkY.png">
  <meta name="description" content="Soccer Pro Experience — Risultati e classifiche live dei tornei di calcio giovanile.">
  <meta name="theme-color" content="#0a0e17">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="loading-screen">
    <div class="loading-logo">
      <img id="loading-img" style="width:90px;height:90px;border-radius:50%;object-fit:cover;" alt="Soccer Pro Experience">
      <div class="loading-text">Caricamento in corso...</div>
    </div>
  </div>

  <div id="main-app" style="display:none;">
    <header>
      <div class="header-inner">
        <div class="header-left">
          <img id="header-logo" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(29,111,232,0.5);" alt="SPE">
          <div>
            <div id="header-title" class="h-title">Soccer Pro Experience</div>
            <div id="header-date" class="h-date"></div>
          </div>
        </div>
        <div class="header-right">
          <span class="live-badge">● Live</span>
          <button class="tv-btn" onclick="openTVMode()" title="Modalità TV">📺 TV</button>
          <button class="admin-toggle" id="admin-btn" onclick="toggleAdmin()">Admin</button>
        </div>
      </div>
    </header>

    <!-- MODAL LOGIN -->
    <div id="admin-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box" style="width:320px;">
        <div class="modal-title">🔐 Accesso staff</div>

        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Username</label>
          <input type="text" id="admin-username" placeholder="es. admin1 oppure arbitro3"
            class="form-input" autocomplete="username"
            onkeydown="if(event.key==='Enter')document.getElementById('admin-pw').focus()">
        </div>

        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" id="admin-pw" placeholder="Password"
              class="form-input" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')checkPw()"
              style="padding-right:40px;">
            <button onclick="togglePwVisibility()"
              style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                     background:none;border:none;cursor:pointer;color:#666;font-size:16px;"
              id="pw-eye">👁</button>
          </div>
        </div>

        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;
                      cursor:pointer;margin-bottom:16px;">
          <input type="checkbox" id="admin-remember" style="width:16px;height:16px;cursor:pointer;">
          Ricorda accesso su questo dispositivo
        </label>

        <div id="pw-error" style="color:#ef4444;font-size:12px;margin-bottom:10px;min-height:16px;"></div>

        <div class="modal-actions">
          <button class="btn" onclick="document.getElementById('admin-modal').style.display='none'">Annulla</button>
          <button class="btn btn-p" onclick="checkPw()">Entra →</button>
        </div>

        <details style="margin-top:16px;">
          <summary style="font-size:11px;color:#475569;cursor:pointer;">Mostra credenziali</summary>
          <div style="margin-top:10px;font-size:11px;color:#64748b;background:rgba(255,255,255,0.04);
                      border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:10px;line-height:1.8;">
            <strong style="color:#94a3b8;">ADMIN:</strong><br>
            admin1 / Spe_Admin1! &nbsp;·&nbsp; admin2 / Spe_Admin2! &nbsp;·&nbsp; admin3 / Spe_Admin3!<br><br>
            <strong style="color:#94a3b8;">ARBITRI:</strong><br>
            arbitro1→10 / Arb2026_1! … Arb2026_10!
          </div>
        </details>
      </div>
    </div>

    <nav>
      <div class="nav-inner" id="pub-nav">
        <button class="nav-btn active" data-section="classifiche" onclick="showSection('classifiche',this)">Classifiche</button>
        <button class="nav-btn" data-section="risultati"  onclick="showSection('risultati',this)">Risultati</button>
        <button class="nav-btn" data-section="tabellone" onclick="showSection('tabellone',this)">Tabellone</button>
      </div>
      <div class="nav-inner" id="admin-nav" style="display:none;">
        <button class="nav-btn active" data-section="a-tornei"    onclick="showSection('a-tornei',this)">Tornei</button>
        <button class="nav-btn"        data-section="a-setup"     onclick="showSection('a-setup',this)">Categorie</button>
        <button class="nav-btn"        data-section="a-loghi"     onclick="showSection('a-loghi',this)">Loghi</button>
        <button class="nav-btn"        data-section="a-risultati" onclick="showSection('a-risultati',this)">Risultati</button>
        <button class="nav-btn"        data-section="a-knockout"  onclick="showSection('a-knockout',this)">Fase finale</button>
        <button class="nav-btn nav-exit" onclick="exitAdmin()">✕ Esci</button>
      </div>
    </nav>

    <div id="torneo-bar" class="torneo-bar"></div>
    <div class="cat-bar" id="cat-bar"></div>

    <main id="main-content">
      <div id="sec-classifiche"  class="sec active"></div>
      <div id="sec-risultati"    class="sec"></div>
      <div id="sec-tabellone"    class="sec"></div>
      <div id="sec-a-tornei"     class="sec"></div>
      <div id="sec-a-setup"      class="sec"></div>
      <div id="sec-a-loghi"      class="sec"></div>
      <div id="sec-a-risultati"  class="sec"></div>
      <div id="sec-a-knockout"   class="sec"></div>
    </main>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     📺 TV MODE OVERLAY
════════════════════════════════════════════════════ -->
<div id="tv-mode" class="tv-mode">
  <button class="tv-close-btn" onclick="closeTVMode()">✕ Chiudi</button>

  <div class="tv-header">
    <div class="tv-logo-area">
      <img id="tv-logo" style="width:56px;height:56px;border-radius:50%;object-fit:cover;" alt="SPE">
      <div>
        <div id="tv-title" class="tv-title">Soccer Pro Experience</div>
        <div id="tv-subtitle" class="tv-subtitle">● Risultati in diretta</div>
      </div>
    </div>
    <div style="text-align:right;">
      <div id="tv-clock" class="tv-clock">00:00</div>
      <div id="tv-date-str" class="tv-date-str"></div>
    </div>
  </div>

  <div class="tv-nav">
    <button class="tv-nav-btn active" onclick="tvShowSection('classifiche',this)">📊 Classifiche</button>
    <button class="tv-nav-btn" onclick="tvShowSection('risultati',this)">⚽ Risultati</button>
    <button class="tv-nav-btn" onclick="tvShowSection('tabellone',this)">🏆 Tabellone</button>
    <button class="tv-nav-btn" onclick="tvToggleAutoScroll(this)" id="tv-autoscroll-btn" style="margin-left:auto;">▶ Auto-scorrimento</button>
  </div>

  <div id="tv-cat-bar" class="tv-cat-bar"></div>

  <div id="tv-content" class="tv-content"></div>

  <div class="tv-scroll-bar">
    <div class="tv-scroll-progress" id="tv-scroll-progress" style="width:0%"></div>
  </div>
</div>

<div id="toast"></div>

<script>
function togglePwVisibility() {
  const inp = document.getElementById('admin-pw');
  const eye = document.getElementById('pw-eye');
  if (inp.type === 'password') { inp.type='text';  eye.textContent='🙈'; }
  else                         { inp.type='password'; eye.textContent='👁'; }
}
</script>

<script src="config.js"></script>
<script src="db.js"></script>
<script src="logo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="import.js"></script>
<script src="export.js"></script>
<script src="app.js"></script>
<script src="tv.js"></script>
</body>
</html>
